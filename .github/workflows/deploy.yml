name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST || secrets.SSH_HOST || secrets.HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER || secrets.SSH_USER || secrets.USERNAME }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY || secrets.SSH_PRIVATE_KEY || secrets.SSH_KEY }}
      SERVER_PORT: ${{ secrets.SERVER_PORT || secrets.SSH_PORT || '22' }}
    steps:
      - name: Validate deploy secrets
        shell: bash
        run: |
          missing=0
          for key in SERVER_HOST SERVER_USER SERVER_SSH_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error title=Missing secret::$key is empty. Configure repo secrets (SERVER_* or SSH_* fallback names)."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy on server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ env.SERVER_SSH_KEY }}
          port: ${{ env.SERVER_PORT }}
          script_stop: true
          script: |
            bash /var/www/jobfillai/deploy/deploy.sh

      - name: Notify success
        if: success()
        run: echo "::notice title=zoommate Deploy::Deployment completed successfully."

      - name: Notify failure
        if: failure()
        run: echo "::error title=zoommate Deploy::Deployment failed."
