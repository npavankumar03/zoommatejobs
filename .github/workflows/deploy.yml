name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy on server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            bash /var/www/jobfillai/deploy/deploy.sh

      - name: Notify success
        if: success()
        run: echo "::notice title=JobFill AI Deploy::Deployment completed successfully."

      - name: Notify failure
        if: failure()
        run: echo "::error title=JobFill AI Deploy::Deployment failed."
