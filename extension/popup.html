<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>zoommate</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --line: #e2e8f0;
        --brand: #0f766e;
        --brand-strong: #0f5f59;
        --danger: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 340px;
        min-height: 460px;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .shell {
        padding: 16px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }

      .header {
        padding: 14px 14px 12px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo {
        width: 32px;
        height: 32px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 12px;
        color: #fff;
        background: linear-gradient(135deg, #0ea5e9, #10b981);
      }

      .brand h1 {
        margin: 0;
        font-size: 15px;
        line-height: 1.2;
      }

      .provider-badge {
        font-size: 11px;
        font-weight: 700;
        color: #0f172a;
        border: 1px solid #cbd5e1;
        border-radius: 999px;
        padding: 4px 8px;
        max-width: 120px;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
      }

      .section {
        padding: 12px 14px;
      }

      .user-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .avatar {
        width: 38px;
        height: 38px;
        border-radius: 999px;
        border: 1px solid var(--line);
        object-fit: cover;
        background: #dbeafe;
        flex: 0 0 auto;
      }

      .user-meta {
        min-width: 0;
      }

      .user-name {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .user-email {
        margin: 2px 0 0;
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .usage {
        margin-top: 10px;
        font-size: 12px;
      }

      .usage-bar {
        margin-top: 6px;
        width: 100%;
        height: 8px;
        border-radius: 999px;
        background: #e2e8f0;
        overflow: hidden;
      }

      .usage-fill {
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #22c55e, #14b8a6);
      }

      .divider {
        border-top: 1px solid var(--line);
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 12px;
      }

      .toggle-row:last-child {
        margin-bottom: 0;
      }

      .toggle-label {
        font-size: 12px;
        font-weight: 600;
      }

      .toggle-help {
        display: block;
        margin-top: 2px;
        font-size: 11px;
        color: var(--muted);
      }

      .toggle {
        position: relative;
        width: 44px;
        height: 24px;
        flex: 0 0 auto;
      }

      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        cursor: pointer;
        transition: 0.2s;
        background: #cbd5e1;
      }

      .slider::before {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        left: 3px;
        top: 3px;
        border-radius: 999px;
        background: #fff;
        transition: 0.2s;
      }

      .toggle input:checked + .slider {
        background: #0ea5a4;
      }

      .toggle input:checked + .slider::before {
        transform: translateX(20px);
      }

      .button-row {
        padding: 12px 14px 14px;
        display: grid;
        gap: 8px;
      }

      button {
        border: 0;
        border-radius: 10px;
        font-family: inherit;
        font-size: 12px;
        font-weight: 700;
        padding: 10px 12px;
        cursor: pointer;
      }

      .btn-primary {
        background: var(--brand);
        color: #fff;
      }

      .btn-primary:hover {
        background: var(--brand-strong);
      }

      .btn-secondary {
        background: #e2e8f0;
        color: #0f172a;
      }

      .btn-danger {
        background: #fee2e2;
        color: var(--danger);
      }

      .logged-out {
        padding: 18px 14px 10px;
      }

      .logged-out h2 {
        margin: 0;
        font-size: 14px;
      }

      .logged-out p {
        margin: 8px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <header class="header">
          <div class="brand">
            <span class="logo">ZM</span>
            <h1>zoommate</h1>
          </div>
          <span id="providerBadge" class="provider-badge">GPT-4o</span>
        </header>

        <div id="loggedInView" class="hidden">
          <div class="section">
            <div class="user-row">
              <img id="userAvatar" class="avatar" alt="User avatar" />
              <div class="user-meta">
                <p id="userName" class="user-name">User</p>
                <p id="userEmail" class="user-email">user@example.com</p>
              </div>
            </div>

            <div class="usage">
              <span id="usageText">0 / 10 fills used today</span>
              <div class="usage-bar">
                <div id="usageFill" class="usage-fill"></div>
              </div>
            </div>
          </div>

          <div class="divider"></div>

          <div class="section">
            <div class="toggle-row">
              <div>
                <span class="toggle-label">Auto-detect forms</span>
                <span class="toggle-help">Inject button on job application pages</span>
              </div>
              <label class="toggle">
                <input id="autoDetectToggle" type="checkbox" />
                <span class="slider"></span>
              </label>
            </div>

            <div class="toggle-row">
              <div>
                <span class="toggle-label">Show result panel</span>
                <span class="toggle-help">Display editable fill summary after run</span>
              </div>
              <label class="toggle">
                <input id="showPanelToggle" type="checkbox" />
                <span class="slider"></span>
              </label>
            </div>
          </div>

          <div class="button-row">
            <button id="openDashboardBtn" type="button" class="btn-primary">Open Dashboard</button>
            <button id="signOutBtn" type="button" class="btn-danger">Sign out</button>
          </div>
        </div>

        <div id="loggedOutView" class="logged-out hidden">
          <h2>Not logged in</h2>
          <p>Login at jobs.zoommate.in to start autofilling forms.</p>
          <div class="button-row" style="padding: 12px 0 0;">
            <button id="loginBtn" type="button" class="btn-primary">Login at jobs.zoommate.in</button>
          </div>
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
